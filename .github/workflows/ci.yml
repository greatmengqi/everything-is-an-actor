name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build rust_core
        run: |
          uv pip install maturin
          cd rust_core && uv run maturin develop

      - name: Run tests
        run: uv run pytest tests/ --ignore=tests/plugins -v

      - name: Lint
        run: uv run ruff check everything_is_an_actor/

      - name: Format
        run: uv run ruff format --check everything_is_an_actor/

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Check Rust format
        run: |
          cd rust_core
          cargo fmt --check
