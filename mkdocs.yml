site_name: actor-for-agents
site_description: Asyncio-native Actor framework for Python agent systems
site_url: https://greatmengqi.github.io/actor-for-agents
repo_url: https://github.com/greatmengqi/actor-for-agents
repo_name: actor-for-agents

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Agent Layer: agents.md
    - Design: design.md
  - API Reference:
    - AgentActor: api/agent-actor.md
    - Core Actor: api/actor.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
