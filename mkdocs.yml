site_name: everything-is-an-actor
site_description: Asyncio-native Actor framework for Python agent systems
site_url: https://greatmengqi.github.io/everything-is-an-actor
repo_url: https://github.com/greatmengqi/everything-is-an-actor
repo_name: everything-is-an-actor

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Agent Layer: agents.md
    - Flow API: flow.md
    - Mixture of Agents (MOA): moa.md
    - Actor Lifecycle: lifecycle.md
    - Mailbox Architecture: mailbox.md
    - ComposableFuture: composable-future.md
    - Best Practices: best-practices.md
  - Architecture:
    - Design: design.md
    - Categorical Analysis: categorical-analysis.md
  - API Reference:
    - AgentActor: api/agent-actor.md
    - Core Actor: api/actor.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
